# Default configuration for the Serial Log Testing Platform

# Serial connection settings
serial:
  default_baud_rate: 115200
  timeout: 1.0  # seconds
  reconnect_attempts: 3
  reconnect_delay: 2.0  # seconds

# Logging settings
logging:
  level: INFO
  file_rotation: 5  # Number of backup files to keep
  max_file_size: 10485760  # 10 MB
  console_output: true

# Device settings
devices:
  # Example device configurations
  mkr:
    type: MKR
    vendor_id: 0x2341  # Arduino
    baud_rate: 115200
    
  esp32:
    type: ESP32
    vendor_id: 0x10C4  # Silicon Labs CP210x
    baud_rate: 115200

# Data storage
storage:
  type: sqlite  # or csv
  db_path: data/logs.db
  csv_dir: data/csv 